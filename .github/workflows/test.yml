name: Tests

on:
  push:
    branches: [ main, phase-d-quality-net ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Syntax check (server.js + app.js)
        run: npm run check

      - name: Run unit + integration tests
        run: npm test
