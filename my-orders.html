<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f5132">
<title>บิลของฉัน — บ้านหวยเรือนเลขเศรษฐี</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #0a3a23; --green: #0f5132; --gold: #ffd966;
  --bg: #f7f5ef; --surface: #fff; --border: #e1ddd0;
  --text: #1a2e22; --text-soft: #6b7280;
  --shadow: 0 4px 14px rgba(15,81,50,.12); --radius: 14px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: env(safe-area-inset-bottom); }
.page { max-width: 720px; margin: 0 auto; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
.topbar { background: linear-gradient(135deg, var(--green-dark), var(--green)); color: #fff; padding: 14px 18px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.topbar .row { display: flex; align-items: center; gap: 12px; }
.topbar .brand-mark { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; background: var(--gold); color: var(--green-dark); font-weight: 800; font-size: 18px; }
.topbar .brand-eyebrow { font-size: 11px; opacity: .8; }
.topbar .brand-title { font-size: 16px; font-weight: 700; }

.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 66px; z-index: 9; }
.tab { flex: 1; padding: 14px 8px; text-align: center; font-weight: 600; font-size: 13px; color: var(--text-soft); cursor: pointer; border: none; background: transparent; border-bottom: 3px solid transparent; font-family: inherit; }
.tab.active { color: var(--green); border-bottom-color: var(--gold); }

.content { padding: 14px; }
.empty { text-align: center; padding: 50px 20px; color: var(--text-soft); }
.empty .icon { font-size: 60px; margin-bottom: 12px; }
.empty .cta { display: inline-block; margin-top: 14px; background: var(--green); color: white; padding: 10px 22px; border-radius: 999px; text-decoration: none; font-weight: 600; }

.skel { background: linear-gradient(90deg, #e8e3d3 0%, #f2eedf 50%, #e8e3d3 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 10px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skel-card { height: 140px; margin-bottom: 12px; }

.order-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.order-card .top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.order-card .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
.b-pending { background: #fef3c7; color: #92400e; }
.b-verifying { background: #dbeafe; color: #1e40af; }
.b-confirmed { background: #e0e7ff; color: #3730a3; }
.b-checking { background: #ede9fe; color: #5b21b6; }
.b-won { background: #d1fae5; color: #065f46; }
.b-paid { background: #ccfbf1; color: #115e59; }
.b-lost { background: #f3f4f6; color: #374151; }
.b-cancel { background: #fee2e2; color: #991b1b; }

.order-card .code-chip { background: #f3f4f6; padding: 3px 8px; border-radius: 6px; font-family: monospace; font-size: 12px; cursor: pointer; margin-left: auto; user-select: all; }
.order-card .code-chip:active { background: #e5e7eb; }
.order-card .lottery-row { font-size: 14px; color: var(--text); margin: 4px 0; }
.order-card .lottery-row strong { color: var(--green-dark); }
.order-card .eta { font-size: 12px; color: var(--text-soft); margin-top: 4px; }
.order-card .total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
.order-card .total-amount { font-weight: 700; color: var(--green-dark); font-variant-numeric: tabular-nums; }
.order-card .win-amount { color: #065f46; font-weight: 700; }

.order-card .cta-btn { background: var(--green); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; min-height: 36px; cursor: pointer; font-family: inherit; }
.order-card .cta-btn.secondary { background: white; color: var(--green); border: 1px solid var(--green); }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--green-dark); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity .2s; }
.toast.show { opacity: 1; }

.footer-note { text-align: center; padding: 16px; color: var(--text-soft); font-size: 12px; }
</style>
</head>
<body>
<div class="page">
  <header class="topbar">
    <div class="row">
      <span class="brand-mark">฿</span>
      <div>
        <div class="brand-eyebrow">บ้านหวยเรือนเลขเศรษฐี</div>
        <div class="brand-title">บิลของฉัน</div>
      </div>
    </div>
  </header>
  <nav class="tabs" role="tablist">
    <button class="tab active" data-filter="all" type="button">ทั้งหมด</button>
    <button class="tab" data-filter="pending" type="button">กำลังดำเนินการ</button>
    <button class="tab" data-filter="done" type="button">ออกผลแล้ว</button>
  </nav>
  <main class="content" id="content">
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
  </main>
  <div class="footer-note">รบกวนแอดมินผ่าน LINE OA สำหรับสอบถามเพิ่มเติม</div>
</div>
<div class="toast" id="toast"></div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="/my-orders.js?v=1"></script>
</body>
</html>
